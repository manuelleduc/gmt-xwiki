---
name: XWiki __GMT_VAR_VERSION__ - Idle - PostgreSQL
author: Manuel Leduc <manuel.leduc@gmail.com>
description: Boots a pre-initialized XWiki and measures 300 seconds of idle operation (baseline).

compose-file: !include compose.yml

flow:
  - name: Wait for XWiki
    container: gcb-playwright
    hidden: true
    commands:
      - type: console
        shell: bash
        command: bash /tmp/repo/playwright-files/wait_for_xwiki.sh

  - name: Idle
    container: gcb-playwright
    commands:
      - type: console
        command: sleep 300
        note: XWiki idling, no interaction
