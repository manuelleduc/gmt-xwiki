---
name: XWiki __GMT_VAR_VERSION__ - Reload Empty Page - PostgreSQL - Firefox
author: Manuel Leduc <manuel.leduc@gmail.com>
description: >
  500x bin/get/GMT/EmptyPage (urllib, no skin) then
  30x bin/view/GMT/EmptyPage (Firefox, full Flamingo skin).
  Floor for page-render cost when there is no content to render.

compose-file: !include compose.yml

flow:
  - name: Wait for XWiki
    container: gcb-playwright
    hidden: true
    commands:
      - type: console
        shell: bash
        command: bash /tmp/repo/playwright-files/wait_for_xwiki.sh

  - name: Reload empty page
    container: gcb-playwright
    commands:
      - type: console
        command: python3 /tmp/repo/playwright-files/reload_empty.py firefox
        note: 500x no-UI + 30x UI
        read-notes-stdout: true
