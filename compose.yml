# XWiki stack with the Standard flavor pre-installed (seeded images).
# Generate seed/ first: see provision/compose-blank.yml and CLAUDE.md.
services:
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile-db
    image: gmt-xwiki-db-seeded:17.10.9
    environment:
      POSTGRES_USER: xwiki
      POSTGRES_PASSWORD: xwiki
      POSTGRES_DB: xwiki
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale-provider=builtin --locale=C.UTF-8"
    healthcheck:
      # -h 127.0.0.1 forces TCP: the unix socket is already up while the
      # init scripts (seed dump load) are still running
      test: pg_isready -U xwiki -d xwiki -h 127.0.0.1
      interval: 1h
      start_period: 120s
      start_interval: 2s

  xwiki:
    build:
      context: .
      dockerfile: docker/Dockerfile-xwiki
    image: gmt-xwiki-seeded:17.10.9
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: xwiki
      DB_PASSWORD: xwiki
      DB_DATABASE: xwiki
      DB_HOST: db
    healthcheck:
      test: curl --fail --silent http://localhost:8080/bin/view/Main/ -o /dev/null
      interval: 1h
      start_period: 300s
      start_interval: 2s
