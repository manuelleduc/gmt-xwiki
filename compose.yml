# XWiki stack with the Standard flavor pre-installed (seeded images).
# This file is consumed by GMT, which substitutes __GMT_VAR_VERSION__
# (locally via run_measurements.sh --variable; on the hosted cluster via
# the request form's "Variables" field).
#
# The images are published to GHCR by provision/provision_version.sh so the
# measurement cluster can pull them (seed/ artifacts are not committed).
# run_measurements.sh builds and tags them locally so local runs never pull.
services:
  db:
    image: ghcr.io/manuelleduc/gmt-xwiki-db-seeded:__GMT_VAR_VERSION__
    environment:
      POSTGRES_USER: xwiki
      POSTGRES_PASSWORD: xwiki
      POSTGRES_DB: xwiki
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale-provider=builtin --locale=C.UTF-8"
    healthcheck:
      # -h 127.0.0.1 forces TCP: the unix socket is already up while the
      # init scripts (seed dump load) are still running
      test: pg_isready -U xwiki -d xwiki -h 127.0.0.1
      interval: 1h
      start_period: 120s
      start_interval: 2s

  xwiki:
    image: ghcr.io/manuelleduc/gmt-xwiki-seeded:__GMT_VAR_VERSION__
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: xwiki
      DB_PASSWORD: xwiki
      DB_DATABASE: xwiki
      DB_HOST: db
    healthcheck:
      test: curl --fail --silent http://localhost:8080/bin/view/Main/ -o /dev/null
      interval: 1h
      start_period: 300s
      start_interval: 2s
