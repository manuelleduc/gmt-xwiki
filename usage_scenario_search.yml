---
name: XWiki __GMT_VAR_VERSION__ - Search - PostgreSQL - Firefox
author: Manuel Leduc <manuel.leduc@gmail.com>
description: A visitor uses the quick search bar and opens a result (exercises Solr).

compose-file: !include compose.yml

services:
  gcb-playwright:
    image: greencoding/gcb_playwright:v21
    depends_on:
      # plain depends_on (running, not healthy): the hosted cluster caps the
      # healthcheck wait at 60s (user capability, not settable per run) and
      # XWiki needs several minutes — the hidden flow step below waits instead
      - xwiki
    environment:
      HOST_URL: http://xwiki:8080
    command: ["tail", "-f", "/dev/null"]

flow:
  - name: Wait for XWiki
    container: gcb-playwright
    hidden: true
    commands:
      - type: console
        shell: bash
        command: timeout 600 bash -c 'until curl -fs http://xwiki:8080/bin/view/Main/ -o /dev/null; do sleep 2; done'

  - name: Search the wiki
    container: gcb-playwright
    commands:
      - type: console
        command: python3 /tmp/repo/playwright-files/search.py firefox
        note: Quick search and result navigation
        read-notes-stdout: true
