# Blank (unseeded) XWiki stack, used only to generate the seed/<version>/ artifacts.
# The measured stack (../compose.yml) builds images with this state baked in.
# XWIKI_VERSION is interpolated by docker compose from the environment.
#
# Use the wrapper: ./provision/provision_version.sh <version>
services:
  db:
    image: postgres:17.5
    environment:
      POSTGRES_USER: xwiki
      POSTGRES_PASSWORD: xwiki
      POSTGRES_DB: xwiki
      # md5 (not the postgres 14+ scram-sha-256 default): the pgjdbc driver
      # bundled in xwiki <= 10.x images (9.4.1212) cannot do SCRAM auth.
      # Local (socket) auth stays trust so pg_dump in provision_version.sh
      # keeps working without a password.
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale-provider=builtin --locale=C.UTF-8 --auth-host=md5"
    healthcheck:
      test: pg_isready -U xwiki -d xwiki -h 127.0.0.1
      interval: 5s
      start_period: 60s

  xwiki:
    image: "xwiki:${XWIKI_VERSION:-17.10.9}-postgres-tomcat"
    depends_on:
      db:
        condition: service_healthy
    # Docker's embedded DNS proved flaky under the flavor install's many
    # concurrent extension downloads; use upstream resolvers directly.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DB_USER: xwiki
      DB_PASSWORD: xwiki
      DB_DATABASE: xwiki
      DB_HOST: db
    healthcheck:
      test: curl --fail --silent http://localhost:8080/bin/view/Main/ -o /dev/null || curl --silent -o /dev/null -w '%{http_code}' http://localhost:8080/bin/view/Main/ | grep -q 302
      interval: 5s
      start_period: 300s
